# build.properties — configuración local del proyecto Ant
# Este archivo SÍ se sube al repo (solo valores genéricos).
# Para valores personales, crea un build.local.properties (está en .gitignore).

# Versión del proyecto
project.version=1.0-SNAPSHOT

# Puertos por defecto (los desarrolladores pueden sobreescribir en build.local.properties)
tcp.port=5000
http.port=8080

# Ruta a los archivos de datos del padrón
# Cada desarrollador debe colocar PADRON.txt y distelec.txt en resources/data/
data.dir=resources/data
